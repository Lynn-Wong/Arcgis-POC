user root;  #http://nginx.org/en/docs/ngx_core_module.html#user
worker_processes  auto;

# error_log  logs/error.log  error;
# pid        logs/nginx.pie;


events {
    worker_connections 1024;
}

http {
    # include /etc/nginx/variables.conf;
    include /etc/nginx/mime.types;
    
    map $pid$hostname $fixed_nonce_raw {
        default $pid$hostname;
    }
    map $fixed_nonce_raw $fixed_nonce {
        default "202603211451202603211451";
        "~^([0-9a-zA-Z]+)"  "$1";
    }
    server {
        listen 4200;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        set $csp "
                default-src 'self';
                script-src 'self' 'wasm-unsafe-eval' 'nonce-$fixed_nonce';
                script-src-elem 'self' 'nonce-$fixed_nonce' https://js.arcgis.com; 
                style-src 'self' 'nonce-$fixed_nonce' https://js.arcgis.com;
                img-src 'self' data: blob: https:;
                connect-src 'self'
                    data:
                    https://*.arcgis.com
                    https://*.arcgisonline.com
                    https://utility.arcgis.com
                    https://basemaps-api.arcgis.com;
                font-src 'self';
                frame-src 'self' https://*.arcgis.com;
                object-src 'none';
                worker-src 'self' blob:;
                base-uri 'self';
                form-action 'self';
                frame-ancestors 'self';
        ";
        add_header Content-Security-Policy $csp;
        location / {
                #sub_filter_types text/html;
                sub_filter_once off;
                sub_filter '{{NONCE}}' $fixed_nonce;
                sub_filter '{{CSP}}' $csp;
                sub_filter '<script>' '<script nonce="$fixed_nonce">';
                sub_filter '<style>' '<style nonce="$fixed_nonce">';

                try_files $uri $uri/ /index.html;
        }

        location /api {
                proxy_pass http://backend_container:3000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Prefix /api;

                proxy_redirect http://backend_container:3000/ /api/;

                proxy_connect_timeout 30s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
        }

        location /assets/esri/ {
                alias /usr/share/nginx/html/assets/esri/;
                expires 7d;
                add_header Cache-Control "public, max-age=604800";
                add_header Content-Security-Policy $csp;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                add_header Content-Security-Policy $csp;
                sub_filter_once off;
                sub_filter '{{NONCE}}' $fixed_nonce;
                sub_filter '{{CSP}}' $csp;
                sub_filter '<script>' '<script nonce="$fixed_nonce">';
                sub_filter '<style>' '<style nonce="$fixed_nonce">';
                expires 7d;
                add_header Cache-Control "public, max-age=604800";
                add_header Pragma "public";
        }

        location ~* \.json$ {
                add_header Content-Security-Policy $csp;
                sub_filter_once off;
                sub_filter '{{NONCE}}' $fixed_nonce;
                sub_filter '{{CSP}}' $csp;
                sub_filter '<script>' '<script nonce="$fixed_nonce">';
                sub_filter '<style>' '<style nonce="$fixed_nonce">';
                expires 1h;
                add_header Cache-Control "public, max-age=3600";
        }

        location ~* \.html$ {
                add_header Content-Security-Policy $csp;
                sub_filter_once off;
                sub_filter '{{NONCE}}' $fixed_nonce;
                sub_filter '{{CSP}}' $csp;
                sub_filter '<script>' '<script nonce="$fixed_nonce">';
                sub_filter '<style>' '<style nonce="$fixed_nonce">';
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~ /\.(?!well-known).* {
                deny all;
        }
    }
}