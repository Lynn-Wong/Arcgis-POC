<div class="map-controls">
  <div class="view-toggle">
    <button [class.active]="!is3D" (click)="!is3D || toggleView()">2D View</button>
    <button [class.active]="is3D" (click)="is3D || toggleView()">3D View</button>
  </div>
  <!-- Base Map:<select [value]="selectedBasemap" (change)="onBasemapChange($event)">
    @for (basemap of basemaps; track basemap.value) {
      <option [value]="basemap.value">{{ basemap.label }}</option>
    }
  </select> -->
   Fly To:<select [value]="selectedLocation" (change)="onLocationChange($event)">
    @for (location of locations; track location.name) {
      <option [value]="location.name">{{ location.name }}</option>
    }
  </select>
  <button (click)="addMarker()">Add Marker</button>
  <button (click)="clearGraphics()">Clear Markers</button>
</div>
<div class="map-container">
  <div #mapContainer id="map" class="map-box"></div>
  <div class="zoom-controls">
    <button (click)="zoomIn()" class="zoom-btn" title="Zoom In">+</button>
    <button (click)="zoomOut()" class="zoom-btn" title="Zoom Out">−</button>
  </div>
  @if (isLoading()) {
    <div class="loading-overlay">
      <div class="spinner">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>
      <span class="loading-text">Loading...</span>
    </div>
  }
</div>
