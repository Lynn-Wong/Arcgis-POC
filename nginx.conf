worker_processes 1;
error_log logs/error.log warn;
pid logs/nginx.pid;
events {
    worker_connections 1024;
}
http {
    include mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log logs/access.log main;
    
    # NONCE 固定值: 202603211451202603211451
    # 与前端 index.html 中的 nonce 值保持一致
    
    server {
        listen 8080;
        
        location / {
            root "C:/DEV/HDB-POC/angular 18/frontend/dist/frontend/browser";
            index index.html;
            try_files $uri /index.html;
            
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-202603211451202603211451'; style-src 'self' 'nonce-202603211451202603211451'; img-src 'self' data: blob: https://services.arcgis.com https://*.arcgis.com; connect-src 'self' http://localhost:3000 http://localhost:4200 https://services.arcgis.com; worker-src 'self' blob:; frame-src 'self' https://services.arcgis.com; require-trusted-types-for 'script';" always;
        }
        
        location /api/ {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}